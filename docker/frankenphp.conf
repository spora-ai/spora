{$SERVER_NAME:localhost} {
	root * /app/public

	# Security headers — applied to ALL responses (PHP API + static assets)
	header {
		Strict-Transport-Security "max-age=31536000; includeSubDomains; preload"
		X-Content-Type-Options nosniff
		X-Frame-Options DENY
		X-XSS-Protection "1; mode=block"
		Referrer-Policy strict-origin-when-cross-origin
	}

	# Mercure hub
	mercure {
		publisher_jwt {env.SPORA_MERCURE_JWT_KEY} HS256
		subscriber_jwt {env.SPORA_MERCURE_JWT_KEY} HS256
		anonymous
	}

	# Spora admin UI — SPA assets and index.html fallback, scoped to
	# /spora/*. try_files falls back to the SPA shell so client-side
	# routes don't 404; only /spora/* paths reach this handler, so
	# root / and any operator-owned path fall through to PHP below.
	handle /spora/* {
		root * /app/public
		try_files {path} /spora/index.html
		file_server
	}

	# Everything else — /api/*, /, /plugins/*, .well-known/*, and any
	# operator-owned paths — delegates to public/index.php which dispatches
	# /api/* through the framework, serves /spora/* from the SPA, identity-
	# maps /plugins/*, and 301s / to /spora/ by default.
	php_server
}
