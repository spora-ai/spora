sonar.projectKey=spora-ai_Spora
sonar.organization=spora-ai

# Sources and tests. The skeleton has no tests/ directory — testing happens
# upstream in spora-ai/spora-core. The app/ directory holds project-local
# customisations scaffolded via spora-ai/spora-maker.
sonar.sources=app
sonar.tests=app
sonar.test.inclusions=**/*Test.php,**/*.Test.php
sonar.exclusions=vendor/**,storage/**,public/**,public/spora/**,docker/**

# Coverage is generated by spora-core; the skeleton doesn't run its own suite.
sonar.php.coverage.reportPaths=